name: CI Pipeline

on: 
  push:
    branches: 
      - main
    paths: 
      - 'app/**'

permissions:
  contents: write
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # Checkout repo
      - name: Checkout code
        uses: actions/checkout@v4

        # Lint HTML files
      - name: Lint HTML
        run: npx htmlhint "app/**/*.html"

      # Set up Docker Buildx 
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      #  Login to GHCR
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ews500
          password: ${{ secrets.GITHUB_TOKEN }}

      # Build and push image 
      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          platforms: linux/arm64
          tags: ghcr.io/ews500/projectrepo/app:${{ github.sha }}

      #  Update Kubernetes manifest in deployemnt.yaml
      - name: Update image tag in deployment
        run: |
          sed -i "s|image: ghcr.io/ews500/projectrepo/app:.*|image: ghcr.io/ews500/projectrepo/app:${{ github.sha }}|g" k8s/deployment.yaml

      #  Commit & push 
      - name: Commit and push changes
        run: |
          git config user.name "ews500"
          git config user.email "ewandavies05@gmail.com"
          git add k8s/deployment.yaml
          git commit -m "Update image tag to ${{ github.sha }}"
          git push